name: auto update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'at.zip'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y p7zip-full
          pip install requests

      - name: Extract Script
        run: |
          mkdir -p tmp_yt
          # Passwork secret theke nibe
          7z x at.zip -p"${{ secrets.ATT_ZIP_PASSWORD }}" -y -otmp_yt

      - name: Run Python Script
        run: python3 tmp_yt/update_yt.py

      - name: Cleanup
        run: rm -rf tmp_yt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@github.com"
          git add "ATT playlist.m3u"
          git commit -m "Auto Update ATT Playlist: ${{ github.run_id }}" || exit 0
          git pull origin main --rebase
          git push origin main
