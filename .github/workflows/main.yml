name: Super Fast Auto Update

on:
  schedule:
    - cron: '*/5 * * * *' 
  workflow_dispatch:
  push:
    paths:
      - 'at.zip'

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt update
          sudo apt install -y p7zip-full
          pip install requests

      - name: Extract and Run Script
        run: |
          mkdir -p tmp_yt
          7z x at.zip -p"${{ secrets.ATT_ZIP_PASSWORD }}" -y -otmp_yt
          python3 tmp_yt/update_yt.py
          rm -rf tmp_yt

      - name: Commit and Push
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@github.com"
          git add "ATT playlist.m3u"
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Instant Update: $(date)"
            git pull origin main --rebase
            git push origin main
          fi

      - name: Trigger Next Run
    
        run: |
          sleep 60 
          curl -X POST -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/smart-auto-update.yml/dispatches \
          -d '{"ref":"main"}' || echo "Trigger failed but cron will catch up"
